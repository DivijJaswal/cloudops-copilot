apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-api
  namespace: cloudops-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-api
  template:
    metadata:
      labels:
        app: incident-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: incident-api
          image: cloudops-copilot/incident-api:local
          imagePullPolicy: IfNotPresent
          env:
            - name: TRIAGE_AGENT_URL
              value: http://triage-agent:5001
            - name: TRIAGE_AGENT_TIMEOUT_MS
              value: "70000"
            - name: CORS_ORIGIN
              value: http://localhost:30080
            - name: ACCESS_LOGS
              value: "true"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX
              value: "600"
            - name: TRUST_PROXY
              value: "false"
            - name: INCIDENT_API_PORT
              value: "8080"
            - name: INCIDENT_API_HOST
              value: 0.0.0.0
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: incident-api-secret
                  key: JWT_SECRET
                  optional: true
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: incident-api
  namespace: cloudops-copilot
  labels:
    app: incident-api
spec:
  selector:
    app: incident-api
  ports:
    - name: http
      port: 8080
      targetPort: http
