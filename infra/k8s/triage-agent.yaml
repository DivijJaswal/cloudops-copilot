apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-agent
  namespace: cloudops-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage-agent
  template:
    metadata:
      labels:
        app: triage-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: triage-agent
          image: cloudops-copilot/triage-agent:local
          imagePullPolicy: IfNotPresent
          env:
            - name: TRIAGE_AGENT_HOST
              value: 0.0.0.0
            - name: TRIAGE_AGENT_PORT
              value: "5001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_CHAT_MODEL
              value: llama3.1
            - name: OLLAMA_EMBEDDING_MODEL
              value: nomic-embed-text
          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: triage-agent
  namespace: cloudops-copilot
spec:
  selector:
    app: triage-agent
  ports:
    - port: 5001
      targetPort: 5001
