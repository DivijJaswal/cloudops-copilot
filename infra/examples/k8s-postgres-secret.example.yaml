apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cloudops-copilot
type: Opaque
stringData:
  POSTGRES_DB: cloudops_copilot
  POSTGRES_USER: cloudops
  POSTGRES_PASSWORD: replace-with-a-strong-password
  DATABASE_URL: postgres://cloudops:replace-with-a-strong-password@postgres:5432/cloudops_copilot
