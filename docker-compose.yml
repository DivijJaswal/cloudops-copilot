services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cloudops_copilot
      POSTGRES_USER: cloudops
      POSTGRES_PASSWORD: cloudops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudops -d cloudops_copilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.20.7}
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  triage-agent:
    build:
      context: .
      dockerfile: ./services/triage-agent/Dockerfile
    environment:
      TRIAGE_AGENT_HOST: 0.0.0.0
      TRIAGE_AGENT_PORT: 5001
      DATABASE_URL: postgres://cloudops:cloudops@postgres:5432/cloudops_copilot
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: llama3.1
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  incident-api:
    build:
      context: .
      dockerfile: ./services/incident-api/Dockerfile
    environment:
      INCIDENT_API_PORT: 8080
      INCIDENT_API_HOST: 0.0.0.0
      DATABASE_URL: postgres://cloudops:cloudops@postgres:5432/cloudops_copilot
      TRIAGE_AGENT_URL: http://triage-agent:5001
      TRIAGE_AGENT_TIMEOUT_MS: 70000
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      ACCESS_LOGS: "true"
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 600
      TRUST_PROXY: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      triage-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  dashboard:
    build:
      context: ./apps/dashboard
      args:
        VITE_API_URL: /api
    ports:
      - "5173:8080"
    depends_on:
      incident-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles:
      - observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      incident-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.1
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  ollama-data:
  grafana-data:
